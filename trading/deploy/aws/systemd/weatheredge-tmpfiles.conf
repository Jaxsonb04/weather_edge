# systemd-tmpfiles configuration for the Google Weather runtime store
# (Task 8 item 1). /run is tmpfs and is recreated EMPTY on every reboot, so
# this directory (and everything under it -- the TTL-enforced
# google_runtime.db, its generation watermarks, and every parsed Google row)
# resets on every reboot. That is expected, not a bug: the runtime store's
# TTLs are all <= 30 days and its startup purge always runs before any read,
# so a brief post-reboot gap (until the next Google refresh cycle
# repopulates it) is safe -- but it is a real behavior change from a
# permanent SQLite file, and operators should not mistake "watermarks reset
# after every reboot" for data corruption when they see it in a fresh boot's
# logs.
#
# Directory mode 0700: application-owned, NOT group- or world-writable, and
# not world-readable either -- matching
# forecaster/google_weather_store.py:assert_runtime_path's production check
# (metadata.st_mode & (stat.S_IWGRP | stat.S_IWOTH) must be zero) with the
# narrowest permission that still satisfies it. GoogleRuntimeStore itself
# chmods the database FILE to 0600 the moment it opens it; this tmpfiles
# entry only has to get the containing directory right.
#
# Type Path              Mode User          Group          Age Argument
d      /run/weatheredge   0700 __APP_USER__ __APP_GROUP__  -
