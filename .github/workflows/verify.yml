name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    # Production (AWS) runs Python 3.12; development runs 3.13. Both must
    # pass (audit CI-01). Semgrep and the full verification gate run once,
    # on the development interpreter; the production leg runs tests and the
    # bytecode compile gate.
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verification tools
        run: |
          python -m pip install --require-hashes -r requirements/production.lock
          python -m pip install 'semgrep==1.169.0'
          python -m pip install 'pytest==9.0.3'
          python -m pip install --no-build-isolation --no-deps -e .

      - name: Run full verification gate
        if: matrix.python-version == '3.13'
        run: bash scripts/verify_project.sh

      - name: Run Python tests
        if: matrix.python-version != '3.13'
        run: bash scripts/run_tests.sh

      - name: Compile bytecode gate
        if: matrix.python-version != '3.13'
        run: python -m compileall forecaster trading/sfo_kalshi_quant trading/tests scripts

  web:
    # The public SPA is part of the deployed product; CI must prove it
    # lints, tests, builds, and stays inside its bundle budget (audit CI-01).
    name: Web (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      # Licensed artifacts are available only to trusted maintainer events.
      # GitHub does not pass repository secrets to forked pull requests, and
      # the job-level guard ensures untrusted code never reaches this token.
      HEROUI_KEY: ${{ secrets.HEROUI_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Verify HeroUI Pro credential
        run: |
          if [[ -z "$HEROUI_KEY" ]]; then
            echo "::error::HEROUI_KEY is missing from the GitHub Actions secret store."
            exit 1
          fi

      - name: Install licensed HeroUI Pro artifacts
        # --auto suppresses prompts. Clearing CI preserves the version pinned
        # in bun.lock instead of letting the installer upgrade it to "latest".
        run: env -u CI npx -y hpsetup@4.7.0 --auto

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Static bundle budget
        run: bun run bundle:report

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2

      - name: Browser-observed bundle budget
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          bun run preview --host 127.0.0.1 --port 4173 &
          preview_pid=$!
          trap 'kill "$preview_pid"' EXIT
          bun run bundle:capture -- /tmp/weatheredge-initial-resources.txt
          bun run bundle:check:observed -- /tmp/weatheredge-initial-resources.txt
