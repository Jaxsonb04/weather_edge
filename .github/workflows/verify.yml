name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify project
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade semgrep
          python -m pip install -e '.[dev]'

      - name: Run verification gate
        run: bash scripts/verify_project.sh
