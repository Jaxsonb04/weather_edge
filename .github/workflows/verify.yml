name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    # Production (AWS) runs Python 3.12; development runs 3.13. Both must
    # pass (audit CI-01). Semgrep and the full verification gate run once,
    # on the development interpreter; the production leg runs tests and the
    # bytecode compile gate.
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'semgrep==1.169.0'
          python -m pip install -e '.[dev]'

      - name: Run full verification gate
        if: matrix.python-version == '3.13'
        run: bash scripts/verify_project.sh

      - name: Run Python tests
        if: matrix.python-version != '3.13'
        run: bash scripts/run_tests.sh

      - name: Compile bytecode gate
        if: matrix.python-version != '3.13'
        run: python -m compileall forecaster trading/sfo_kalshi_quant trading/tests scripts

  web:
    # The public SPA is part of the deployed product; CI must prove it
    # lints, tests, builds, and stays inside its bundle budget (audit CI-01).
    name: Web (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Bundle budget
        run: bun run bundle:check:observed
